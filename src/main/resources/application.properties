spring.application.name=order-service
server.port=8083

# Database Configuration (overridden by env vars in K8s)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:orderdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (only works when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Prometheus Metrics Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
